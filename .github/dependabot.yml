version: 2
updates:
  # JS/TS deps — security patches only on a weekly cadence to keep the PR
  # volume sane. Group non-major updates so PRs aren't one-per-package.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      production-deps:
        dependency-type: production
        update-types: [minor, patch]
      dev-deps:
        dependency-type: development
        update-types: [minor, patch]
    ignore:
      # Pin Next major upgrades — they break too much to autopilot.
      - dependency-name: next
        update-types: [version-update:semver-major]
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]
      - dependency-name: tailwindcss
        update-types: [version-update:semver-major]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
