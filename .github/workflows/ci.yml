name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint / Typecheck / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Public env vars consumed at build time. Real secrets stay in Vercel.
      # Provide harmless placeholders so `next build` can complete.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-placeholder-anon-key' }}
      NEXT_PUBLIC_APP_URL: "https://example.com"
      NEXT_PUBLIC_ALLOWED_EMAIL_DOMAIN: "example.com"
      NEXT_PUBLIC_RAZORPAY_KEY_ID: "rzp_test_ci_placeholder"
      RAZORPAY_KEY_SECRET: "ci-placeholder-secret"
      SUPABASE_SERVICE_ROLE_KEY: "ci-placeholder-service-role"
      ALLOWED_EMAIL_DOMAIN: "example.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
